<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feature Tabs — Adhoc</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
@font-face{font-family:"New Kansas";src:url("uploads/NewKansas-Regular.otf");font-weight:400;font-display:swap;}
@font-face{font-family:"New Kansas";src:url("uploads/NewKansas-Medium.otf");font-weight:500;font-display:swap;}
@font-face{font-family:"New Kansas";src:url("uploads/NewKansas-Bold.otf");font-weight:700;font-display:swap;}
@font-face{font-family:"New Kansas";src:url("uploads/NewKansas-RegularItalic.otf");font-weight:400;font-style:italic;font-display:swap;}
@font-face{font-family:"Apercu Pro";src:url("uploads/ApercuPro-Regular.ttf");font-weight:400;font-display:swap;}
@font-face{font-family:"Apercu Pro";src:url("uploads/ApercuPro-Medium.ttf");font-weight:500;font-display:swap;}
@font-face{font-family:"Apercu Pro";src:url("uploads/ApercuPro-Bold.ttf");font-weight:700;font-display:swap;}

:root{
  --canvas:#E9E5DF; --surface:#fff; --ink:#000;
  --vio:#7C6CD8; --vio-c:#BCAFEF;
  --cor:#FF7348; --mus:#FEA912;
  --t2:#4A4A4A; --t3:#888; --border:#D4CFC6;
  --tab-inactive:#F5F4F1;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{-webkit-font-smoothing:antialiased;}
body{font-family:"Apercu Pro","Inter",sans-serif;background:var(--surface);color:var(--ink);}
button{font-family:inherit;}

/* Section frame */
.feature-section{padding:96px 32px 120px;background:var(--surface);}
.feature-inner{max-width:1240px;margin:0 auto;}

.feat-headline{
  font-family:"New Kansas",Georgia,serif;font-weight:500;
  font-size:clamp(2.4rem,4.2vw,3.6rem);line-height:1.08;letter-spacing:-.025em;
  text-align:center;max-width:800px;margin:0 auto 48px;text-wrap:balance;
}

/* Tabs */
.feat-tabs{
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
  margin-bottom:40px;
}
.feat-tab{
  font-family:"Apercu Pro",sans-serif;font-size:.9375rem;font-weight:500;
  padding:11px 22px;border-radius:999px;border:none;cursor:pointer;
  background:var(--tab-inactive);color:var(--ink);
  transition:background .2s ease,color .2s ease,transform .15s ease;
  display:inline-flex;align-items:center;gap:8px;white-space:nowrap;
}
.feat-tab:hover{background:#ECEAE5;}
.feat-tab.active{background:var(--ink);color:#fff;}
.feat-tab.active .dot{background:#fff;}
.feat-tab .dot{width:6px;height:6px;border-radius:50%;background:transparent;transition:background .2s;}
.feat-tab.active .dot{background:#fff;}

/* Card */
.feat-card{
  border-radius:32px;padding:56px;
  display:grid;grid-template-columns:1.4fr 1fr;gap:64px;
  min-height:500px;align-items:center;
  transition:background .35s ease,color .35s ease;
  position:relative;overflow:hidden;
}
.feat-visual{position:relative;min-height:380px;display:flex;align-items:center;justify-content:center;}
.feat-text{display:flex;flex-direction:column;gap:20px;}
.feat-eyebrow{
  font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  opacity:.6;
}
.feat-title{
  font-family:"New Kansas",Georgia,serif;font-weight:500;
  font-size:clamp(1.8rem,3vw,2.6rem);line-height:1.1;letter-spacing:-.02em;
}
.feat-sub{
  font-size:1.0625rem;line-height:1.6;opacity:.85;max-width:380px;
}
.feat-cta{
  align-self:flex-start;display:inline-flex;align-items:center;gap:8px;
  font-family:"Apercu Pro",sans-serif;font-size:.95rem;font-weight:500;
  padding:13px 26px;border-radius:999px;cursor:pointer;
  background:transparent;transition:background .2s,transform .15s;
  margin-top:8px;
}
.feat-cta:hover{transform:translateX(2px);}

/* Carousel dots */
.feat-dots{display:flex;justify-content:center;gap:8px;margin-top:32px;}
.feat-dot{width:7px;height:7px;border-radius:50%;background:#D4CFC6;border:none;cursor:pointer;transition:background .2s,width .2s;padding:0;}
.feat-dot.active{background:var(--ink);width:24px;border-radius:999px;}

/* ── Visual mockups ─────────────────────── */
.mock{background:#fff;border-radius:14px;padding:14px;box-shadow:0 12px 40px rgba(0,0,0,.12);color:#000;}
.mock,.fin,.dash,.app,.paper,.tree-node,.hub-node,.pipe-card,.kpi{color:#000;}
.mock-bar{display:flex;align-items:center;gap:5px;padding-bottom:10px;border-bottom:1px solid #EFECE6;margin-bottom:12px;}
.mock-bar .dot{width:9px;height:9px;border-radius:50%;}
.mock-title{font-family:"New Kansas",Georgia,serif;font-weight:500;font-size:.85rem;margin-left:6px;}

/* Card 1 — Pipeline */
.pipe{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.pipe-col{background:#F5F4F1;border-radius:8px;padding:8px;}
.pipe-col h6{font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#888;margin-bottom:6px;}
.pipe-card{background:#fff;border-radius:6px;padding:8px;margin-bottom:5px;font-size:.65rem;border:1px solid #EFECE6;}
.pipe-card .id{color:#888;font-size:.55rem;margin-bottom:2px;}
.pipe-card .nm{font-weight:600;}
.pipe-card .meta{font-size:.55rem;color:#888;margin-top:4px;display:flex;justify-content:space-between;}
.pipe-card.done{background:#E8F5EE;border-color:#B8E2C8;}
.pipe-card.auto{background:#EEEBFB;border-color:#C9C0F0;}
.pipe-card.auto::before{content:"⚡ Auto";display:block;font-size:.5rem;color:#7C6CD8;font-weight:700;margin-bottom:3px;letter-spacing:.04em;}
.flow-arrows{position:absolute;top:48%;left:0;right:0;display:flex;justify-content:space-around;pointer-events:none;font-size:1rem;color:rgba(255,255,255,.5);}

/* Card 2 — Hub */
.hub{position:relative;width:100%;max-width:420px;aspect-ratio:1;}
.hub svg{width:100%;height:100%;}
.hub-node{position:absolute;background:#fff;border-radius:14px;padding:10px 14px;box-shadow:0 8px 24px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;font-size:.78rem;font-weight:600;}
.hub-node .ico{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.85rem;}
.hub-node.center{padding:14px 18px;}
.hub-n1{top:0;left:50%;transform:translateX(-50%);}
.hub-n2{top:30%;right:0;}
.hub-n3{bottom:30%;right:0;}
.hub-n4{bottom:0;left:50%;transform:translateX(-50%);}
.hub-n5{bottom:30%;left:0;}
.hub-n6{top:30%;left:0;}
.hub-c{top:50%;left:50%;transform:translate(-50%,-50%);background:#000;color:#fff;}

/* Card 3 — Escalar (multi-company) */
.tree{display:flex;flex-direction:column;gap:14px;align-items:center;}
.tree-root{background:#000;color:#fff;border-radius:12px;padding:14px 22px;display:flex;align-items:center;gap:10px;}
.tree-row{display:flex;gap:14px;}
.tree-node{background:#fff;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:.8rem;min-width:120px;border:1px solid #EFECE6;}
.tree-node .ico{width:22px;height:22px;border-radius:5px;background:#FEA912;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#000;}
.tree-line{width:2px;height:14px;background:#000;}

/* Card 4 — Dashboard */
.dash{background:#fff;border-radius:12px;padding:16px;width:100%;}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.kpi{background:#F5F4F1;border-radius:8px;padding:10px;}
.kpi-l{font-size:.6rem;color:#888;margin-bottom:3px;}
.kpi-v{font-family:"New Kansas",Georgia,serif;font-weight:600;font-size:1.1rem;line-height:1;}
.kpi-d{font-size:.6rem;font-weight:600;margin-top:3px;}
.kpi-d.up{color:#3BB56A;}
.kpi-d.dn{color:#FF7348;}
.chart{background:#F5F4F1;border-radius:8px;padding:10px;height:100px;display:flex;align-items:flex-end;gap:4px;}
.bar{flex:1;border-radius:3px 3px 0 0;background:#7C6CD8;}

/* Card 5 — Financiero */
.fin{background:#fff;border-radius:12px;padding:0;width:100%;overflow:hidden;}
.fin-h{padding:14px 16px;border-bottom:1px solid #EFECE6;display:flex;align-items:center;justify-content:space-between;}
.fin-h h6{font-family:"New Kansas",Georgia,serif;font-weight:500;font-size:.95rem;}
.fin-tag{font-size:.6rem;font-weight:700;background:#000;color:#fff;padding:3px 8px;border-radius:999px;letter-spacing:.04em;}
.fin-row{display:grid;grid-template-columns:1.5fr .9fr .9fr .6fr;gap:12px;padding:10px 16px;border-bottom:1px solid #F5F4F1;font-size:.78rem;align-items:center;}
.fin-row.head{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#888;background:#FAFAF7;}
.fin-row .num{font-family:"New Kansas",Georgia,serif;font-weight:500;text-align:right;}
.fin-pos{color:#3BB56A;font-weight:600;}
.fin-neg{color:#FF7348;font-weight:600;}
.fin-tot{background:#F5F4F1;font-weight:700;}

/* Card 6 — Digitalizar (paper → digital) */
.digi{display:flex;align-items:center;gap:24px;}
.digi-side{flex:1;}
.paper{background:#fff;border-radius:8px;padding:14px;box-shadow:0 6px 18px rgba(0,0,0,.1);transform:rotate(-3deg);position:relative;}
.paper::before{content:"";position:absolute;top:6px;right:6px;width:14px;height:14px;background:#FF7348;border-radius:50%;}
.paper .ln{height:5px;background:#EFECE6;border-radius:3px;margin-bottom:5px;}
.paper .ln:nth-child(1){width:70%;}
.paper .ln:nth-child(2){width:90%;}
.paper .ln:nth-child(3){width:60%;}
.paper .ln:nth-child(4){width:80%;}
.paper .ln:nth-child(5){width:50%;}
.digi-arrow{font-size:1.6rem;color:rgba(0,0,0,.3);}
.app{background:#fff;border-radius:14px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.12);width:100%;}
.app-h{display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid #EFECE6;margin-bottom:10px;font-size:.78rem;font-weight:600;}
.app-h .ic{width:18px;height:18px;border-radius:4px;background:#7C6CD8;}
.app-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;font-size:.7rem;border-bottom:1px solid #F5F4F1;}
.app-row:last-child{border:none;}
.app-row .ck{width:14px;height:14px;border-radius:50%;border:1.5px solid #D4CFC6;}
.app-row.done .ck{background:#3BB56A;border-color:#3BB56A;}

@media (max-width:880px){
  .feat-card{grid-template-columns:1fr;padding:36px;gap:32px;min-height:auto;}
  .feat-visual{min-height:280px;}
}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ── VISUALS ─────────────────────────────────────────── */
function PipelineVisual(){
  return (
    <div className="mock" style={{width:'100%',maxWidth:520,position:'relative'}}>
      <div className="mock-bar">
        <div className="dot" style={{background:'#FF6058'}}/><div className="dot" style={{background:'#FFBC2E'}}/><div className="dot" style={{background:'#28C840'}}/>
        <div className="mock-title">Flujo de pedidos</div>
      </div>
      <div className="pipe">
        <div className="pipe-col">
          <h6>Pedido</h6>
          <div className="pipe-card"><div className="id">SO-1284</div><div className="nm">RE/MAX Argentina</div><div className="meta"><span>$24.5K</span><span>14:02</span></div></div>
        </div>
        <div className="pipe-col">
          <h6>Aprobación</h6>
          <div className="pipe-card auto"><div className="id">SO-1283</div><div className="nm">Mercado Libre</div><div className="meta"><span>$118K</span><span>13:48</span></div></div>
        </div>
        <div className="pipe-col">
          <h6>Factura</h6>
          <div className="pipe-card auto"><div className="id">FA-0921</div><div className="nm">PayPal LATAM</div><div className="meta"><span>$72K</span><span>13:30</span></div></div>
        </div>
        <div className="pipe-col">
          <h6>Enviado</h6>
          <div className="pipe-card done"><div className="id">FA-0920 ✓</div><div className="nm">OneClick</div><div className="meta"><span>$45K</span><span>13:12</span></div></div>
        </div>
      </div>
    </div>
  );
}

function HubVisual(){
  const nodes=[
    {cls:'hub-n1',ic:'💼',bg:'#BCAFEF',label:'Ventas'},
    {cls:'hub-n2',ic:'📦',bg:'#FFD0BD',label:'Inventario'},
    {cls:'hub-n3',ic:'💰',bg:'#FFE5A8',label:'Finanzas'},
    {cls:'hub-n4',ic:'👥',bg:'#BCAFEF',label:'CRM'},
    {cls:'hub-n5',ic:'🛒',bg:'#FFD0BD',label:'Compras'},
    {cls:'hub-n6',ic:'📊',bg:'#FFE5A8',label:'Reportes'},
  ];
  return (
    <div className="hub">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <g stroke="rgba(0,0,0,.25)" strokeWidth="0.4" strokeDasharray="1.5 1.5" fill="none">
          <line x1="50" y1="50" x2="50" y2="8"/><line x1="50" y1="50" x2="92" y2="30"/>
          <line x1="50" y1="50" x2="92" y2="70"/><line x1="50" y1="50" x2="50" y2="92"/>
          <line x1="50" y1="50" x2="8" y2="70"/><line x1="50" y1="50" x2="8" y2="30"/>
        </g>
      </svg>
      <div className="hub-node hub-c center"><div className="ico" style={{background:'#FF7348'}}>A</div>Adhoc · Odoo</div>
      {nodes.map((n,i)=>(
        <div key={i} className={"hub-node "+n.cls}><div className="ico" style={{background:n.bg}}>{n.ic}</div>{n.label}</div>
      ))}
    </div>
  );
}

function TreeVisual(){
  return (
    <div className="tree">
      <div className="tree-root"><span style={{fontSize:'.95rem',fontFamily:'"New Kansas",Georgia,serif',fontWeight:500}}>Holding</span><span style={{fontSize:'.7rem',opacity:.6}}>· 5 subsidiarias</span></div>
      <div className="tree-line"/>
      <div className="tree-row">
        {['Argentina','Chile','México','Perú','Colombia'].map(c=>(
          <div key={c} className="tree-node"><div className="ico">{c[0]}</div><div><div style={{fontWeight:600}}>{c}</div><div style={{fontSize:'.65rem',color:'#888'}}>Activa · sync</div></div></div>
        ))}
      </div>
      <div style={{display:'flex',gap:6,marginTop:8,fontSize:'.7rem',color:'rgba(0,0,0,.55)',alignItems:'center'}}>
        <span style={{width:8,height:8,borderRadius:'50%',background:'#3BB56A'}}/>Consolidación en tiempo real · MUR · USD · ARS · CLP
      </div>
    </div>
  );
}

function DashVisual(){
  const bars=[42,58,49,72,65,88,76,95];
  return (
    <div className="dash" style={{maxWidth:480}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <h6 style={{fontFamily:'"New Kansas",Georgia,serif',fontWeight:500,fontSize:'.95rem'}}>Tablero ejecutivo</h6>
        <span style={{fontSize:'.62rem',color:'#888'}}>Actualizado · hace 14s</span>
      </div>
      <div className="dash-grid">
        <div className="kpi"><div className="kpi-l">Facturación MTD</div><div className="kpi-v">$4.2M</div><div className="kpi-d up">↑ 18.4%</div></div>
        <div className="kpi"><div className="kpi-l">Pedidos</div><div className="kpi-v">318</div><div className="kpi-d up">↑ 12.1%</div></div>
        <div className="kpi"><div className="kpi-l">Margen</div><div className="kpi-v">31.2%</div><div className="kpi-d dn">↓ 1.4%</div></div>
      </div>
      <div className="chart">
        {bars.map((h,i)=><div key={i} className="bar" style={{height:`${h}%`,background:i===7?'#7C6CD8':i>=5?'#9587E0':'#BCAFEF'}}/>)}
      </div>
    </div>
  );
}

function FinanceVisual(){
  return (
    <div className="fin" style={{maxWidth:520}}>
      <div className="fin-h">
        <h6>Estado de resultados — Q1</h6>
        <span className="fin-tag">CIERRE AUTOMÁTICO</span>
      </div>
      <div className="fin-row head"><span>Cuenta</span><span style={{textAlign:'right'}}>Real</span><span style={{textAlign:'right'}}>Presup.</span><span style={{textAlign:'right'}}>Δ</span></div>
      <div className="fin-row"><span>Ingresos</span><span className="num">$12.4M</span><span className="num">$11.2M</span><span className="num fin-pos">+10.7%</span></div>
      <div className="fin-row"><span>Costos directos</span><span className="num">$5.8M</span><span className="num">$5.6M</span><span className="num fin-neg">+3.5%</span></div>
      <div className="fin-row"><span>Gastos operativos</span><span className="num">$2.1M</span><span className="num">$2.3M</span><span className="num fin-pos">−8.6%</span></div>
      <div className="fin-row fin-tot"><span>EBITDA</span><span className="num">$4.5M</span><span className="num">$3.3M</span><span className="num fin-pos">+36.3%</span></div>
    </div>
  );
}

function DigitalVisual(){
  return (
    <div className="digi" style={{width:'100%',maxWidth:520}}>
      <div className="digi-side">
        <div className="paper">
          <div style={{fontFamily:'"New Kansas",Georgia,serif',fontWeight:500,fontSize:'.85rem',marginBottom:8}}>Remito #4821</div>
          <div className="ln"/><div className="ln"/><div className="ln"/><div className="ln"/><div className="ln"/>
          <div style={{marginTop:10,fontSize:'.6rem',color:'#FF7348',fontWeight:700}}>SIN FIRMA · SIN ARCHIVAR</div>
        </div>
      </div>
      <div className="digi-arrow">→</div>
      <div className="digi-side">
        <div className="app">
          <div className="app-h"><div className="ic"/>Remitos · Adhoc App</div>
          <div className="app-row done"><span>Recepción · Cliente A</span><div className="ck"/></div>
          <div className="app-row done"><span>Firma digital</span><div className="ck"/></div>
          <div className="app-row done"><span>Sync con Odoo</span><div className="ck"/></div>
          <div className="app-row"><span>Notificación cliente</span><div className="ck"/></div>
        </div>
      </div>
    </div>
  );
}

/* ── DATA ─────────────────────────────────────────── */
const FEATURES = [
  {
    id:'auto',
    eyebrow:'01 · Automatización',
    tab:'Automatizar operaciones',
    title:'Automatizar operaciones',
    sub:'Reducí tareas repetitivas y liberá a tu equipo para el trabajo que realmente importa. Menos errores, más velocidad.',
    bg:'#7C6CD8', ink:'#fff', ctaBorder:'#fff', ctaInk:'#fff',
    visual: <PipelineVisual/>,
  },
  {
    id:'inte',
    eyebrow:'02 · Integración',
    tab:'Integrar áreas',
    title:'Integrar áreas',
    sub:'Ventas, stock y finanzas en un solo sistema. Sin copiar datos entre planillas. Sin información desactualizada.',
    bg:'#FF7348', ink:'#000', ctaBorder:'#000', ctaInk:'#000',
    visual: <HubVisual/>,
  },
  {
    id:'esca',
    eyebrow:'03 · Escalabilidad',
    tab:'Escalar con control',
    title:'Escalar con control',
    sub:'Multi-empresa, multi-moneda, multi-país. Adhoc + Odoo crecen con tu operación sin reescribir procesos.',
    bg:'#FEA912', ink:'#000', ctaBorder:'#000', ctaInk:'#000',
    visual: <TreeVisual/>,
  },
  {
    id:'visi',
    eyebrow:'04 · Visibilidad',
    tab:'Ganar visibilidad',
    title:'Ganar visibilidad',
    sub:'Dashboards en tiempo real con tus KPIs reales. Decidí con datos, no con planillas que se desactualizan en una semana.',
    bg:'#BCAFEF', ink:'#000', ctaBorder:'#000', ctaInk:'#000',
    visual: <DashVisual/>,
  },
  {
    id:'fin',
    eyebrow:'05 · Finanzas',
    tab:'Control financiero',
    title:'Control financiero',
    sub:'Cierres mensuales en horas, no semanas. Conciliación automática, presupuestos vivos y reportes contables al instante.',
    bg:'#000', ink:'#E9E5DF', ctaBorder:'#E9E5DF', ctaInk:'#E9E5DF',
    visual: <FinanceVisual/>,
  },
  {
    id:'digi',
    eyebrow:'06 · Digitalización',
    tab:'Digitalizar el negocio',
    title:'Digitalizar el negocio',
    sub:'Sacá los procesos del papel y de Excel. Llevá tu operación a una plataforma moderna sin romper lo que ya funciona.',
    bg:'#E9E5DF', ink:'#000', ctaBorder:'#000', ctaInk:'#000',
    visual: <DigitalVisual/>,
  },
];

/* ── COMPONENT ─────────────────────────────────────── */
function FeatureTabs(){
  const [active,setActive] = useState(0);
  const f = FEATURES[active];

  return (
    <section className="feature-section">
      <div className="feature-inner">
        <h2 className="feat-headline">
          Resolvemos los desafíos que <em style={{fontStyle:'italic',color:'var(--vio)'}}>frenan tu crecimiento.</em>
        </h2>

        <div className="feat-tabs" role="tablist">
          {FEATURES.map((feat,i)=>(
            <button
              key={feat.id}
              role="tab"
              aria-selected={active===i}
              className={"feat-tab"+(active===i?' active':'')}
              onClick={()=>setActive(i)}
            >
              <span className="dot"/>{feat.tab}
            </button>
          ))}
        </div>

        <div
          className="feat-card"
          style={{background:f.bg,color:f.ink}}
          key={f.id}
        >
          <div className="feat-visual">{f.visual}</div>
          <div className="feat-text">
            <span className="feat-eyebrow">{f.eyebrow}</span>
            <h3 className="feat-title">{f.title}</h3>
            <p className="feat-sub">{f.sub}</p>
            <button
              className="feat-cta"
              style={{
                border:`1.5px solid ${f.ctaBorder}`,
                color:f.ctaInk,
              }}
              onMouseEnter={e=>{e.currentTarget.style.background=f.ctaInk;e.currentTarget.style.color=f.bg;}}
              onMouseLeave={e=>{e.currentTarget.style.background='transparent';e.currentTarget.style.color=f.ctaInk;}}
            >
              Ver cómo funciona <span style={{fontSize:'1.05em'}}>→</span>
            </button>
          </div>
        </div>

        <div className="feat-dots">
          {FEATURES.map((_,i)=>(
            <button
              key={i}
              className={"feat-dot"+(active===i?' active':'')}
              onClick={()=>setActive(i)}
              aria-label={`Ir a feature ${i+1}`}
            />
          ))}
        </div>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FeatureTabs/>);
</script>
</body>
</html>
